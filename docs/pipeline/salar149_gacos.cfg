# MintPy — Hombre Muerto track 149 ASC multi-burst, con corrección GACOS (en vez de ERA5).
# Usar cuando lleguen los .ztd de gacos.net (ver COMO_PEDIR_DATOS.md) en ./GACOS/.
mintpy.load.processor      = hyp3
mintpy.load.unwFile        = ./products149/*/*_unw_phase.tif
mintpy.load.corFile        = ./products149/*/*_corr.tif
mintpy.load.demFile        = ./products149/*/*_dem.tif
mintpy.load.incAngleFile   = ./products149/*/*_lv_theta.tif
mintpy.load.azAngleFile    = ./products149/*/*_lv_phi.tif

mintpy.reference.lalo      = auto

mintpy.subset.yx           = no
mintpy.subset.lalo         = -25.50:-25.12, -67.25:-66.85

# Corrección troposférica con GACOS (ECMWF HRES ~9 km + topo) en vez de ERA5.
mintpy.troposphericDelay.method   = gacos
mintpy.troposphericDelay.gacosDir = ./GACOS
mintpy.deramp                     = linear

mintpy.network.coherenceBased   = yes
mintpy.network.minCoherence     = 0.3
