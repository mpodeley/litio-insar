# MintPy — Salar del Hombre Muerto, serie 2019–2026 (~mensual). Fijar el track con 01_search.py.
mintpy.load.processor      = hyp3
mintpy.load.unwFile        = ./products/*/*_unw_phase.tif
mintpy.load.corFile        = ./products/*/*_corr.tif
mintpy.load.demFile        = ./products/*/*_dem.tif
mintpy.load.incAngleFile   = ./products/*/*_lv_theta.tif
mintpy.load.azAngleFile    = ./products/*/*_lv_phi.tif

mintpy.reference.lalo      = auto

# Recorte al AOI = subcuenca occidental de Fénix.
# OJO: mintpy.subset.lalo convierte lon→UTM con un offset (~0.37° al O) sobre estos productos
# (CRS inconsistente), y deja el recorte fuera de Fénix. Se usa subset.yx con la ventana de
# píxeles calculada con pyproj sobre la grilla del producto (origin 505160/7220760, step 80 m,
# EPSG 32719): equivale a lon −67.20..−66.95, lat −25.55..−25.30 (Fénix en x≈2322,y≈516).
mintpy.subset.yx           = 251:602, 2195:2515
mintpy.subset.lalo         = no

# Correcciones: tropo ERA5 (requiere ~/.cdsapirc, ya configurado).
mintpy.troposphericDelay.method = pyaps
mintpy.troposphericDelay.weatherModel = ERA5
mintpy.deramp                   = linear

# Enmascarar baja coherencia.
mintpy.network.coherenceBased   = yes
mintpy.network.minCoherence     = 0.4

# OJO: sobre la operación de Fénix la coherencia temporal es ~0 (solo ~10 px > 0.7 en
# todo el AOI: el salar + piletas decorrelacionan casi por completo en banda C). Con el
# default (minNumPixel=100) MintPy aborta. Bajamos el piso para FORZAR que la cadena
# complete y poder mostrar el mapa (que resulta esencialmente ruido = ausencia de señal
# coherente, no deformación real). Resultado honesto del límite del método acá.
mintpy.networkInversion.minTempCoh  = 0.4
mintpy.networkInversion.minNumPixel = 1
