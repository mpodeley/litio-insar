# MintPy — Salar del Hombre Muerto, track 149 ASC, multi-burst (IW2 x3), serie 2014–2026.
# Stack mergeado por HyP3 (un interferograma por par cubre salar + Fénix). Sin water mask.
mintpy.load.processor      = hyp3
mintpy.load.unwFile        = ./products149/*/*_unw_phase.tif
mintpy.load.corFile        = ./products149/*/*_corr.tif
mintpy.load.demFile        = ./products149/*/*_dem.tif
mintpy.load.incAngleFile   = ./products149/*/*_lv_theta.tif
mintpy.load.azAngleFile    = ./products149/*/*_lv_phi.tif

mintpy.reference.lalo      = auto

# Los productos multi-burst varían unos píxeles de tamaño entre fechas; un subset
# GEOGRÁFICO (misma caja lon/lat leída de cada uno) los pone en grilla común y enfoca
# el salar. (subset.yx=no para anular el del track 83 persistido en smallbaselineApp.cfg.)
mintpy.subset.yx           = no
mintpy.subset.lalo         = -25.50:-25.12, -67.25:-66.85

# Correcciones: tropo ERA5 (requiere ~/.cdsapirc, ya configurado).
mintpy.troposphericDelay.method = pyaps
mintpy.troposphericDelay.weatherModel = ERA5
mintpy.deramp                   = linear

# Enmascarar baja coherencia (umbral suave; sobre el salar puede ser bajo).
mintpy.network.coherenceBased   = yes
mintpy.network.minCoherence     = 0.3
